{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="fw-bold text-success mb-3">Update Profile</h4>
            <p class="text-muted">Keep your contact information up to date so the trek staff can reach you.</p>
            <form method="POST" class="mt-3">
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control" value="{{ current_user.name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Contact Details</label>
                    <input type="text" name="contact" class="form-control" value="{{ current_user.contact_details if current_user.contact_details else '' }}" placeholder="Phone number or emergency contact">
                </div>
                <button type="submit" class="btn btn-success w-100">Save Profile Changes</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
